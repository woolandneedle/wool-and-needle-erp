<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>W&N Swatch Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --charcoal:#1C1B19; --bone:#EDE7DC; --brass:#A87C3F;
  --brass-bright:#C99A5B; --forest:#2F4A3C; --rust:#B0492C;
  --line:rgba(28,27,25,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--charcoal);color:var(--bone);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* Header */
.header{background:var(--charcoal);padding:14px 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--brass);position:sticky;top:0;z-index:10;}
.brand-tag{width:16px;height:22px;background:var(--brass);clip-path:polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);flex-shrink:0;}
.brand-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--bone);}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--brass-bright);letter-spacing:0.1em;text-transform:uppercase;}
.erp-link{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--brass);text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;padding:6px 10px;border:1px solid rgba(168,124,63,0.3);border-radius:1px;}

/* Main */
main{padding:20px 16px 100px;}

/* Camera area */
.camera-section{background:rgba(255,255,255,0.04);border:1.5px solid rgba(237,231,220,0.1);border-radius:4px;overflow:hidden;margin-bottom:16px;}
.camera-preview{width:100%;aspect-ratio:4/3;background:#000;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#videoEl{width:100%;height:100%;object-fit:cover;display:none;}
#capturedImg{width:100%;height:100%;object-fit:cover;display:none;}
.camera-placeholder{text-align:center;padding:30px;}
.camera-placeholder div:first-child{font-size:48px;margin-bottom:12px;opacity:0.3;}
.camera-placeholder div:last-child{font-size:13px;color:rgba(237,231,220,0.4);}
.camera-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.camera-frame{width:70%;height:70%;border:2px solid rgba(168,124,63,0.6);border-radius:4px;box-shadow:0 0 0 2000px rgba(0,0,0,0.35);}

/* Buttons */
.btn-row{display:flex;gap:10px;padding:12px 14px;}
.btn{flex:1;padding:13px 10px;border:none;border-radius:2px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity 0.12s;}
.btn:active{opacity:0.8;}
.btn-camera{background:var(--brass);color:#fff;}
.btn-capture{background:var(--forest);color:#fff;}
.btn-ghost{background:rgba(237,231,220,0.08);color:rgba(237,231,220,0.7);border:1.5px solid rgba(237,231,220,0.12);}
.btn-upload{background:rgba(168,124,63,0.15);color:var(--brass-bright);border:1.5px solid rgba(168,124,63,0.25);}
.btn-save{width:100%;padding:16px;background:var(--forest);color:#fff;border:none;border-radius:2px;font-family:'Fraunces',serif;font-size:18px;font-weight:600;cursor:pointer;letter-spacing:0.01em;transition:background 0.12s;}
.btn-save:disabled{opacity:0.35;cursor:not-allowed;}
.btn-save:not(:disabled):active{background:#243d31;}

/* Status */
.status-bar{padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px;border-top:1px solid rgba(237,231,220,0.06);}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-dot.idle{background:rgba(237,231,220,0.2);}
.status-dot.scanning{background:var(--brass);animation:pulse 1s infinite;}
.status-dot.done{background:var(--forest);}
.status-dot.error{background:var(--rust);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Results */
.results-section{display:none;}
.section-label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--brass-bright);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(237,231,220,0.08);}
.field{margin-bottom:12px;}
.field label{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;color:rgba(237,231,220,0.4);display:block;margin-bottom:4px;}
.field input, .field select{width:100%;padding:11px 13px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(237,231,220,0.12);border-radius:2px;font-family:'Inter',sans-serif;font-size:14px;color:var(--bone);outline:none;-webkit-appearance:none;transition:border-color 0.12s;}
.field input:focus, .field select:focus{border-color:var(--brass);}
.field input::placeholder{color:rgba(237,231,220,0.25);}
.field select option{background:var(--charcoal);color:var(--bone);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.price-field label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.07em;color:rgba(237,231,220,0.35);display:block;margin-bottom:3px;}
.price-field input{width:100%;padding:9px 11px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(237,231,220,0.1);border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--bone);outline:none;}
.price-field input:focus{border-color:var(--brass);}

/* Preview card */
.preview-card{background:rgba(168,124,63,0.08);border:1px solid rgba(168,124,63,0.2);border-left:3px solid var(--brass);border-radius:2px;padding:12px 14px;margin-bottom:16px;}
.preview-code{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--brass-bright);margin-bottom:3px;}
.preview-mill{font-size:13px;color:rgba(237,231,220,0.6);}
.preview-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.preview-tag{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(237,231,220,0.08);color:rgba(237,231,220,0.5);padding:3px 8px;border-radius:10px;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;padding:12px 20px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:999;white-space:nowrap;letter-spacing:0.04em;}
</style>
</head>
<body>

<div class="header">
  <div class="brand-tag"></div>
  <div>
    <div class="brand-name">Wool &amp; Needle</div>
    <div class="brand-sub">Swatch Scanner</div>
  </div>
  <a class="erp-link" href="https://stunning-pithivier-277b19.netlify.app" target="_blank">↗ ERP</a>
</div>

<main>

  <!-- Camera -->
  <div class="camera-section">
    <div class="camera-preview" id="cameraPreview">
      <video id="videoEl" autoplay playsinline muted></video>
      <img id="capturedImg" alt="Captured swatch">
      <div class="camera-placeholder" id="cameraPlaceholder">
        <div>📷</div>
        <div>Tap to open camera or upload a photo</div>
      </div>
      <div class="camera-overlay" id="cameraOverlay" style="display:none;">
        <div class="camera-frame"></div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-dot idle" id="statusDot"></div>
      <span id="statusText">Ready to scan</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-camera" onclick="startCamera()" id="btnCamera">📷 Camera</button>
      <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">⬆ Upload</button>
      <button class="btn btn-capture" onclick="capturePhoto()" id="btnCapture" style="display:none;">⚡ Scan</button>
      <button class="btn btn-ghost" onclick="resetScanner()" id="btnReset" style="display:none;">↺ Reset</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;" onchange="handleFileUpload(this)">
  </div>

  <!-- Results (shown after scan) -->
  <div class="results-section" id="resultsSection">

    <div class="preview-card" id="previewCard"></div>

    <div class="section-label">Fabric Details — Review &amp; Edit</div>

    <div class="field">
      <label>Fabric Code *</label>
      <input type="text" id="fCode" placeholder="e.g. DAA502A" style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;text-transform:uppercase;">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Mill</label>
        <input type="text" id="fMill" placeholder="e.g. Loro Piana">
      </div>
      <div class="field">
        <label>Book / Collection</label>
        <input type="text" id="fBook" placeholder="e.g. Tasmanian">
      </div>
    </div>

    <div class="field">
      <label>Status</label>
      <select id="fStatus">
        <option value="Active">Active</option>
        <option value="Sold Out">Sold Out</option>
        <option value="Discontinued">Discontinued</option>
      </select>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Wool %</label>
        <input type="number" id="fWool" placeholder="100" min="0" max="100">
      </div>
      <div class="field">
        <label>Weight (g/m)</label>
        <input type="number" id="fWeight" placeholder="280">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Origin</label>
        <input type="text" id="fOrigin" placeholder="Italy">
      </div>
      <div class="field">
        <label>Season</label>
        <select id="fSeason">
          <option value="">— Any —</option>
          <option>Spring/Summer</option>
          <option>Autumn/Winter</option>
          <option>All Season</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Tags <span style="font-weight:400;opacity:0.5;">(comma separated)</span></label>
      <input type="text" id="fTags" placeholder="navy, herringbone, wool">
    </div>

    <div class="section-label" style="margin-top:20px;">Reference Pricing</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(237,231,220,0.3);margin-bottom:10px;line-height:1.6;">Enter wholesale price for one garment — other garments calculated automatically by yardage ratio</div>

    <div class="field">
      <label>Reference Garment</label>
      <select id="fRefGarment" onchange="updatePrices()">
        <option value="3-Piece Suit">3-Piece Suit</option>
        <option value="2-Piece Suit">2-Piece Suit</option>
        <option value="Jacket">Jacket</option>
        <option value="Trousers">Trousers</option>
      </select>
    </div>

    <div class="field">
      <label>Wholesale Price ($)</label>
      <input type="number" id="fRefPrice" placeholder="0.00" step="0.01" min="0" oninput="updatePrices()">
    </div>

    <div class="section-label" style="margin-top:4px;">Calculated Prices</div>
    <div class="price-grid" id="priceGrid"></div>

    <button class="btn-save" id="btnSave" onclick="saveToSupabase()">💾 Save to Inventory</button>

  </div>

</main>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://pceqnxugmfstghmulvbn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjZXFueHVnbWZzdGdobXVsdmJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NDUyMjMsImV4cCI6MjA5OTIyMTIyM30.Uu41ueW_lWDR-cFloLWI2vnKJVQJCigh92Qc2XMQULk';
const EDGE_URL     = SUPABASE_URL + '/functions/v1/swatch-scan';

const GARMENTS = [
  '3-Piece Suit','2-Piece Suit','Jacket','Trousers','Waistcoat','Shirt',
  'Overcoat','Jeans','Denim Jacket',"Women's 2-Piece Suit","Women's Jacket",
  "Women's Pants","Women's Skirt","Women's Waistcoat","Women's Shirt","Women's Overcoat"
];
const YARDAGE = {
  '3-Piece Suit':1.0,'2-Piece Suit':0.78,'Jacket':0.55,'Trousers':0.32,
  'Waistcoat':0.22,'Shirt':0.18,'Overcoat':0.85,'Jeans':0.30,'Denim Jacket':0.50,
  "Women's 2-Piece Suit":0.75,"Women's Jacket":0.50,"Women's Pants":0.28,
  "Women's Skirt":0.20,"Women's Waistcoat":0.20,"Women's Shirt":0.16,"Women's Overcoat":0.80
};

let stream      = null;
let capturedB64 = null;
let capturedMime = 'image/jpeg';
let scannedData = null;

// ── Camera ────────────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
    });
    const video = document.getElementById('videoEl');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('cameraPlaceholder').style.display = 'none';
    document.getElementById('cameraOverlay').style.display = 'flex';
    document.getElementById('btnCamera').style.display  = 'none';
    document.getElementById('btnCapture').style.display = 'flex';
    setStatus('idle', 'Point at swatch label and tap Scan');
  } catch(e) {
    showToast('Camera access denied — use Upload instead');
  }
}

function capturePhoto() {
  const video = document.getElementById('videoEl');
  if (!video.srcObject) return;
  const canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedMime = 'image/jpeg';
  capturedB64  = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
  showCaptured(canvas.toDataURL('image/jpeg', 0.85));
  stopCamera();
  analyseImage();
}

function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    capturedMime = file.type || 'image/jpeg';
    capturedB64  = e.target.result.split(',')[1];
    showCaptured(e.target.result);
    analyseImage();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function showCaptured(src) {
  const img = document.getElementById('capturedImg');
  img.src = src;
  img.style.display = 'block';
  document.getElementById('videoEl').style.display = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'none';
  document.getElementById('cameraOverlay').style.display = 'none';
  document.getElementById('btnCapture').style.display = 'none';
  document.getElementById('btnReset').style.display   = 'flex';
  document.getElementById('btnCamera').style.display  = 'none';
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function resetScanner() {
  stopCamera();
  document.getElementById('capturedImg').style.display   = 'none';
  document.getElementById('videoEl').style.display       = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'block';
  document.getElementById('cameraOverlay').style.display = 'none';
  document.getElementById('btnCamera').style.display     = 'flex';
  document.getElementById('btnCapture').style.display    = 'none';
  document.getElementById('btnReset').style.display      = 'none';
  document.getElementById('resultsSection').style.display = 'none';
  capturedB64 = null; scannedData = null;
  setStatus('idle', 'Ready to scan');
}

// ── Analysis ──────────────────────────────────────────────────
async function analyseImage() {
  if (!capturedB64) return;
  setStatus('scanning', 'Reading fabric label...');
  document.getElementById('resultsSection').style.display = 'none';

  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ imageBase64: capturedB64, mediaType: capturedMime })
    });

    if (!res.ok) throw new Error('Scan failed — ' + res.status);
    const result = await res.json();
    if (!result.success) throw new Error(result.error || 'Analysis failed');

    scannedData = result.data;
    populateFields(scannedData);
    setStatus('done', 'Fabric read — review and save');
    document.getElementById('resultsSection').style.display = 'block';

  } catch(err) {
    setStatus('error', 'Error: ' + err.message);
    showToast('Could not read fabric — try again');
  }
}

function populateFields(d) {
  document.getElementById('fCode').value   = (d.code||'').toUpperCase();
  document.getElementById('fMill').value   = d.mill||'';
  document.getElementById('fBook').value   = d.book||'';
  document.getElementById('fWool').value   = d.composition?.wool||'';
  document.getElementById('fWeight').value = d.composition?.weight||'';
  document.getElementById('fOrigin').value = d.composition?.origin||'';
  if (d.composition?.season) {
    const sel = document.getElementById('fSeason');
    for (let o of sel.options) { if (o.value === d.composition.season) { sel.value = d.composition.season; break; } }
  }
  document.getElementById('fTags').value = Array.isArray(d.tags) ? d.tags.join(', ') : (d.tags||'');

  // Preview card
  document.getElementById('previewCard').innerHTML =
    '<div class="preview-code">' + (d.code||'—') + '</div>' +
    '<div class="preview-mill">' + [d.mill, d.color, d.pattern].filter(Boolean).join(' · ') + '</div>' +
    (Array.isArray(d.tags) && d.tags.length ? '<div class="preview-tags">' + d.tags.map(t => '<span class="preview-tag">'+t+'</span>').join('') + '</div>' : '');

  updatePrices();
}

function updatePrices() {
  const refGarment = document.getElementById('fRefGarment').value;
  const refPrice   = parseFloat(document.getElementById('fRefPrice').value) || 0;
  const refRatio   = YARDAGE[refGarment] || 1;
  const grid       = document.getElementById('priceGrid');

  grid.innerHTML = GARMENTS.map(g => {
    const price = refPrice > 0 ? (refPrice * (YARDAGE[g] / refRatio)).toFixed(2) : '';
    return '<div class="price-field"><label>' + g + '</label><input type="number" value="' + price + '" step="0.01" min="0" id="price_' + g.replace(/[^a-zA-Z0-9]/g,'_') + '"></div>';
  }).join('');
}

// ── Save to Supabase ──────────────────────────────────────────
async function saveToSupabase() {
  const code = document.getElementById('fCode').value.trim().toUpperCase();
  if (!code) { showToast('Please enter a fabric code'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    // Build wholesale prices
    const wholesalePrices = {};
    GARMENTS.forEach(g => {
      const key = 'price_' + g.replace(/[^a-zA-Z0-9]/g,'_');
      const el  = document.getElementById(key);
      if (el && el.value) wholesalePrices[g] = parseFloat(el.value);
    });

    // Build tags array
    const tags = document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean);

    // Build fabric row
    const fabric = {
      code,
      mill:             document.getElementById('fMill').value.trim()   || null,
      book:             document.getElementById('fBook').value.trim()    || null,
      status:           document.getElementById('fStatus').value         || 'active',
      tags,
      composition: {
        wool:   parseFloat(document.getElementById('fWool').value)   || null,
        weight: parseFloat(document.getElementById('fWeight').value) || null,
        origin: document.getElementById('fOrigin').value.trim()      || null,
        season: document.getElementById('fSeason').value             || null,
      },
      wholesale_prices: wholesalePrices,
      notes:            document.getElementById('fNotes')?.value?.trim() || null,
      scanned_at:       new Date().toISOString(),
      updated_at:       new Date().toISOString(),
    };

    // Upsert into fabrics table (conflict on code)
    const saveRes = await fetch(SUPABASE_URL + '/rest/v1/fabrics', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'resolution=merge-duplicates',
        'on-conflict': 'code'
      },
      body: JSON.stringify(fabric)
    });

    if (!saveRes.ok) {
      const errBody = await saveRes.text();
      throw new Error('Save failed — ' + saveRes.status + ' — ' + errBody);
    }

    showToast('✓ ' + code + ' saved to inventory');
    setStatus('done', code + ' saved to Fabric Inventory');
    btn.textContent = '✓ Saved!';
    btn.style.background = 'var(--forest)';
    setTimeout(() => { resetScanner(); btn.disabled=false; btn.textContent='💾 Save to Inventory'; btn.style.background=''; }, 2000);

  } catch(err) {
    showToast('Save failed: ' + err.message);
    btn.disabled = false;
    btn.textContent = '💾 Save to Inventory';
  }
}

// ── UI helpers ────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = text;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

// Init prices on load
updatePrices();
</script>
</body>
</html>
